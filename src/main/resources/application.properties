server.port=8080
spring.profiles.active=local

services.users.url=${USERS_SERVICE_URL}
services.payments.url=${PAYMENTS_SERVICE_URL}
services.orders.url=${ORDERS_SERVICE_URL}

spring.thymeleaf.cache=false
spring.jackson.serialization.indent-output=true
services.shipping.url=${SHIPPING_SERVICE_URL}
services.catalog.url=${CATALOG_SERVICE_URL}

spring.datasource.url=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME:fakestore_orders}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.flyway.url=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME:fakestore_orders}
spring.flyway.user=${DB_ADMIN_USER}
spring.flyway.password=${DB_ADMIN_PASSWORD}
spring.flyway.table=flyway_schema_history_website
