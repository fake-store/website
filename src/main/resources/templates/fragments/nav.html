<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Standard nav: wordmark + cart + user menu / login -->
<nav th:fragment="main">
    <a href="/" class="nav-wordmark">
        <img th:src="@{/images/wordmark.png}" alt="Fakestore">
    </a>
    <div class="nav-right">
        <a href="https://github.com/fake-store" class="nav-link-muted" target="_blank" rel="noopener">About</a>
        <a href="/admin" class="nav-link-muted">Admin</a>
        <a href="/cart" class="cart-btn"
           th:text="${cartCount != null and cartCount > 0 ? 'Cart (' + cartCount + ')' : 'Cart'}">Cart</a>
        <div th:if="${username != null}">
            <details class="user-menu">
                <summary th:text="${username}"></summary>
                <div class="user-menu-dropdown">
                    <a href="/me">My Account</a>
                    <a href="/me/orders">My Orders</a>
                    <hr>
                    <a href="/logout">Sign out</a>
                </div>
            </details>
        </div>
        <div th:if="${username == null}">
            <a href="/login" class="login-btn">Sign in</a>
        </div>
    </div>
</nav>

</body>
</html>
