<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fakestore - Shipping Addresses</title>
    <link rel="stylesheet" th:href="@{/css/fakestore.css}">
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <style>
        main { display: grid; gap: 1.5rem; max-width: 900px; }
        .unavailable { color: #9ca3af; font-style: italic; }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        th { text-align: left; padding: 0.4rem 0.75rem; background: #f3f4f6; color: #374151; font-weight: 600; }
        td { padding: 0.4rem 0.75rem; border-top: 1px solid var(--border); vertical-align: middle; }
        .btn-sm { background: var(--brand-purple); color: white; border: none; padding: 0.25rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .btn-sm:hover { background: var(--brand-purple-hover); }
        .btn-link { background: none; border: none; color: var(--brand-purple); cursor: pointer; font-size: 0.875rem; padding: 0; text-decoration: underline; }
        details summary { cursor: pointer; list-style: none; }
        details summary::-webkit-details-marker { display: none; }
        details[open] summary { margin-bottom: 0.5rem; }
        .inline-form { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-top: 0.4rem; }
        .inline-form input { padding: 0.25rem 0.5rem; border: 1px solid #d1d5db; border-radius: 4px; font-size: 0.875rem; width: auto; }
        .back-link { font-size: 0.875rem; color: var(--text-muted); text-decoration: none; }
        .back-link:hover { color: var(--text-dark); }
    </style>
</head>
<body>
<nav th:replace="~{fragments/nav :: main}"></nav>
<main>
    <a href="/me" class="back-link">← My Account</a>

    <div class="card">
        <h2>Shipping Addresses</h2>
        <div th:if="${successShipping}" class="alert-success" th:text="${successShipping}"></div>
        <div th:if="${errorShipping}" class="alert-error" th:text="${errorShipping}"></div>
        <div th:if="${shippingAddresses == null}" class="unavailable">Shipping service unavailable.</div>
        <div th:if="${shippingAddresses != null}">
            <div th:if="${#lists.isEmpty(shippingAddresses)}" class="unavailable">No shipping addresses on file.</div>
            <table th:if="${!#lists.isEmpty(shippingAddresses)}">
                <thead>
                    <tr><th>Label</th><th>Address</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${shippingAddresses}">
                        <td th:text="${a.label}"></td>
                        <td th:text="${a.street + ', ' + a.city + ', ' + a.state + ' ' + a.postalCode + ', ' + a.country}"></td>
                        <td>
                            <details>
                                <summary><button type="button" class="btn-sm">Edit</button></summary>
                                <form method="post" th:action="@{/me/shipping/{id}/update(id=${a.id})}" style="margin-top:0.4rem;">
                                    <div class="inline-form">
                                        <input type="text" name="label" th:value="${a.label}" placeholder="Label" required>
                                        <input type="text" name="street" th:value="${a.street}" placeholder="Street" required>
                                        <input type="text" name="city" th:value="${a.city}" placeholder="City" required>
                                        <input type="text" name="state" th:value="${a.state}" placeholder="State" required>
                                        <input type="text" name="postalCode" th:value="${a.postalCode}" placeholder="Postal code" required>
                                        <input type="text" name="country" th:value="${a.country}" placeholder="Country" required>
                                        <button type="submit" class="btn-sm">Save</button>
                                    </div>
                                </form>
                            </details>
                            <form method="post" th:action="@{/me/shipping/{id}/delete(id=${a.id})}" style="display:inline;"
                                  onsubmit="return confirm('Remove this address?')">
                                <button type="submit" class="btn-danger">Remove</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div style="margin-top: 1rem;">
                <details>
                    <summary><button type="button" class="btn-link">+ Add shipping address</button></summary>
                    <form method="post" th:action="@{/me/shipping/add}" style="margin-top: 0.5rem;">
                        <div class="inline-form">
                            <input type="text" name="label" placeholder="Label (e.g. Home)" required>
                            <input type="text" name="street" placeholder="Street" required>
                            <input type="text" name="city" placeholder="City" required>
                            <input type="text" name="state" placeholder="State" required>
                            <input type="text" name="postalCode" placeholder="Postal code" required>
                            <input type="text" name="country" placeholder="Country" required>
                            <button type="submit" class="btn-sm">Add</button>
                        </div>
                    </form>
                </details>
            </div>
        </div>
    </div>
</main>
</body>
</html>
