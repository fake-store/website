<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fakestore - Payment Methods</title>
    <link rel="stylesheet" th:href="@{/css/fakestore.css}">
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <style>
        main { display: grid; gap: 1.5rem; max-width: 900px; }
        .unavailable { color: #9ca3af; font-style: italic; }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        th { text-align: left; padding: 0.4rem 0.75rem; background: #f3f4f6; color: #374151; font-weight: 600; }
        td { padding: 0.4rem 0.75rem; border-top: 1px solid var(--border); vertical-align: middle; }
        .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; background: #ede9fe; color: var(--brand-purple); }
        .btn-sm { background: var(--brand-purple); color: white; border: none; padding: 0.25rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .btn-sm:hover { background: var(--brand-purple-hover); }
        .btn-link { background: none; border: none; color: var(--brand-purple); cursor: pointer; font-size: 0.875rem; padding: 0; text-decoration: underline; }
        details summary { cursor: pointer; list-style: none; }
        details summary::-webkit-details-marker { display: none; }
        details[open] summary { margin-bottom: 0.5rem; }
        .inline-form { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-top: 0.4rem; }
        .inline-form input, .inline-form select { padding: 0.25rem 0.5rem; border: 1px solid #d1d5db; border-radius: 4px; font-size: 0.875rem; width: auto; }
        label.check-label { font-size: 0.875rem; display: flex; align-items: center; gap: 0.3rem; margin-top: 0; }
        .back-link { font-size: 0.875rem; color: var(--text-muted); text-decoration: none; }
        .back-link:hover { color: var(--text-dark); }
    </style>
</head>
<body>
<nav th:replace="~{fragments/nav :: main}"></nav>
<main>
    <a href="/me" class="back-link">← My Account</a>

    <div class="card">
        <h2>Payment Methods</h2>
        <div th:if="${successPayments}" class="alert-success" th:text="${successPayments}"></div>
        <div th:if="${errorPayments}" class="alert-error" th:text="${errorPayments}"></div>
        <div th:if="${paymentMethods == null}" class="unavailable">Payments service unavailable.</div>
        <div th:if="${paymentMethods != null}">
            <div th:if="${#lists.isEmpty(paymentMethods)}" class="unavailable">No payment methods on file.</div>
            <table th:if="${!#lists.isEmpty(paymentMethods)}">
                <thead>
                    <tr><th>Type</th><th>Label</th><th>Default</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${paymentMethods}">
                        <td th:text="${m.type}"></td>
                        <td th:text="${m.label}"></td>
                        <td><span th:if="${m.isDefault}" class="badge">Default</span></td>
                        <td>
                            <details>
                                <summary><button type="button" class="btn-sm">Edit</button></summary>
                                <form method="post" th:action="@{/me/payments/{id}/update(id=${m.userPaymentMethodId})}">
                                    <div class="inline-form">
                                        <input type="text" name="label" th:value="${m.label}" required>
                                        <label class="check-label">
                                            <input type="checkbox" name="isDefault" value="true" th:checked="${m.isDefault}">Default
                                        </label>
                                        <button type="submit" class="btn-sm">Save</button>
                                    </div>
                                </form>
                            </details>
                            <form method="post" th:action="@{/me/payments/{id}/delete(id=${m.userPaymentMethodId})}" style="display:inline;"
                                  onsubmit="return confirm('Remove this payment method?')">
                                <button type="submit" class="btn-danger">Remove</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div style="margin-top: 1rem;">
                <details>
                    <summary><button type="button" class="btn-link">+ Add payment method</button></summary>
                    <form method="post" th:action="@{/me/payments/add}" style="margin-top: 0.5rem;">
                        <div class="inline-form">
                            <select name="type" required>
                                <option value="">— Select type —</option>
                                <option th:each="t : ${paymentMethodTypes}" th:value="${t}" th:text="${t}"></option>
                            </select>
                            <input type="text" name="label" placeholder="Label" required>
                            <button type="submit" class="btn-sm">Add</button>
                        </div>
                    </form>
                </details>
            </div>
        </div>
    </div>

</main>
</body>
</html>
