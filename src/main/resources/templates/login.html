<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fakestore - Sign in</title>
    <link rel="stylesheet" th:href="@{/css/fakestore.css}">
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <style>
        main { display: flex; justify-content: center; padding-top: 4rem; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 320px; }
        .login-card button { width: 100%; padding: 0.6rem; font-size: 1rem; margin-top: 1rem; }
        .error { color: #b91c1c; margin-bottom: 1rem; font-size: 0.875rem; }
        .footer-link { margin-top: 1rem; text-align: center; font-size: 0.875rem; }
        .footer-link a { color: var(--brand-purple); text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<nav th:replace="~{fragments/nav :: main}"></nav>
<main>
    <div class="login-card">
        <div th:if="${error}" class="error" th:text="${error}"></div>
        <form method="post" action="/login">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autofocus>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <button type="submit" class="btn">Sign in</button>
        </form>
        <div class="footer-link">Don't have an account? <a href="/register">Register</a></div>
    </div>
</main>
</body>
</html>
