<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fakestore - Admin</title>
    <link rel="stylesheet" th:href="@{/css/fakestore.css}">
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <style>
        .stat { font-size: 1.5rem; font-weight: 700; color: var(--text-dark); margin: 0.75rem 0; }
        .stat span { font-size: 0.9rem; font-weight: 400; color: var(--text-muted); }
        .alert-warn { margin-bottom: 0.75rem; }
        .unavailable { color: #9ca3af; font-style: italic; font-size: 0.95rem; margin: 0.75rem 0; }
    </style>
</head>
<body>
<nav th:replace="~{fragments/nav :: admin}"></nav>
<main style="max-width: 700px;">
    <div class="card">
        <h2>Users</h2>
        <div th:if="${message}" class="alert-warn" th:text="${message}"></div>
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>
        <div th:if="${userCount != null}" class="stat">
            <span th:text="${userCount}"></span> <span>users in system</span>
        </div>
        <div th:if="${userCount == null}" class="unavailable">Users service unreachable</div>
        <form method="post" th:action="@{/admin/users/delete-all}"
              onsubmit="return confirm('Delete ALL users? This cannot be undone.')">
            <button type="submit" class="btn-danger" th:disabled="${userCount == null}">Delete All Users</button>
        </form>
    </div>
</main>
</body>
</html>
