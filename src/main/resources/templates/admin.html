<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fakestore - Admin</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f5f5f5; }
        nav { background: #111827; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav h1 { margin: 0; font-size: 1.25rem; }
        nav span { font-size: 0.75rem; color: #6b7280; }
        main { padding: 2rem; max-width: 700px; margin: 0 auto; display: grid; gap: 1.5rem; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h2 { margin-top: 0; font-size: 1.1rem; color: #111827; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.5rem; }
        .stat { font-size: 1.5rem; font-weight: 700; color: #111827; margin: 0.75rem 0; }
        .stat span { font-size: 0.9rem; font-weight: 400; color: #6b7280; }
        .btn-danger { background: #dc2626; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.875rem; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-danger:disabled { background: #9ca3af; cursor: not-allowed; }
        .message { background: #fef9c3; color: #713f12; padding: 0.6rem 0.9rem; border-radius: 4px; font-size: 0.875rem; margin-bottom: 0.75rem; }
        .error { background: #fee2e2; color: #b91c1c; padding: 0.6rem 0.9rem; border-radius: 4px; font-size: 0.875rem; margin-bottom: 0.75rem; }
        .unavailable { color: #9ca3af; font-style: italic; font-size: 0.95rem; margin: 0.75rem 0; }
    </style>
</head>
<body>
<nav>
    <h1>Fakestore Admin</h1>
    <span>⚠ Unsecured</span>
</nav>
<main>
    <div class="card">
        <h2>Users</h2>
        <div th:if="${message}" class="message" th:text="${message}"></div>
        <div th:if="${error}" class="error" th:text="${error}"></div>
        <div th:if="${userCount != null}" class="stat">
            <span th:text="${userCount}"></span> <span>users in system</span>
        </div>
        <div th:if="${userCount == null}" class="unavailable">Users service unreachable</div>
        <form method="post" th:action="@{/admin/users/delete-all}"
              onsubmit="return confirm('Delete ALL users? This cannot be undone.')">
            <button type="submit" class="btn-danger" th:disabled="${userCount == null}">Delete All Users</button>
        </form>
    </div>
</main>
</body>
</html>
