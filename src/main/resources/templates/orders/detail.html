<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fakestore - Order</title>
    <meta th:if="${order.status == 'CREATED' or order.status == 'SUBMITTED'}"
          http-equiv="refresh" content="5">
    <link rel="stylesheet" th:href="@{/css/fakestore.css}">
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <style>
        main { display: grid; gap: 1.5rem; max-width: 900px; }
        .order-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        .order-header h1 { margin: 0; font-size: 1.25rem; }
        .back-link { color: var(--text-muted); font-size: 0.875rem; text-decoration: none; }
        .back-link:hover { color: var(--text-dark); }
        .status { display: inline-block; padding: 0.25rem 0.65rem; border-radius: 9999px; font-size: 0.8rem; font-weight: 600; }
        .status-SUBMITTED, .status-CREATED { background: #fef9c3; color: #854d0e; }
        .status-PAID       { background: #dcfce7; color: #15803d; }
        .status-REJECTED   { background: #fee2e2; color: #b91c1c; }
        .status-CANCELLED  { background: #f3f4f6; color: #6b7280; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; padding: 0.5rem 0.75rem; background: #f3f4f6; color: #374151; font-weight: 600; }
        td { padding: 0.5rem 0.75rem; border-top: 1px solid var(--border); }
        .total-row td { font-weight: 700; border-top: 2px solid var(--border); }
        .field { margin: 0.35rem 0; font-size: 0.9rem; }
        .field span { color: var(--text-muted); }
        .unavailable { color: #9ca3af; font-style: italic; font-size: 0.875rem; }
        .payment-processing { display: flex; align-items: center; gap: 0.75rem; padding: 1rem; background: #fefce8; border: 1px solid #fde68a; border-radius: 6px; color: #92400e; }
        .payment-paid { display: flex; align-items: center; gap: 0.75rem; padding: 1rem; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px; color: #166534; }
        .payment-rejected { display: flex; align-items: center; gap: 0.75rem; padding: 1rem; background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; color: #991b1b; }
        .payment-icon { font-size: 1.25rem; }
        .payment-detail { font-size: 0.875rem; color: var(--text-muted); margin-top: 0.25rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { display: inline-block; width: 1.1rem; height: 1.1rem; border: 2px solid #fde68a; border-top-color: #92400e; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
    </style>
</head>
<body>
<nav th:replace="~{fragments/nav :: main}"></nav>
<main>

    <!-- Header -->
    <div class="order-header">
        <div>
            <h1>Order <code th:text="${#strings.substring(order.id.toString(), 0, 8) + '…'}"></code></h1>
            <div style="margin-top:0.4rem;">
                <span class="status" th:classappend="'status-' + ${order.status}" th:text="${order.status}"></span>
                <span style="color:var(--text-muted);font-size:0.875rem;margin-left:0.75rem;"
                      th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
            </div>
        </div>
        <a href="/me/orders" class="back-link">← All orders</a>
    </div>

    <!-- Items -->
    <div class="card">
        <h2>Items</h2>
        <table>
            <thead>
                <tr><th>Product</th><th>Price</th><th>Qty</th><th>Subtotal</th></tr>
            </thead>
            <tbody>
                <tr th:each="item : ${order.items}">
                    <td th:text="${item.title}"></td>
                    <td th:text="'$' + ${item.price}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="'$' + ${#numbers.formatDecimal(item.price * item.quantity, 1, 2)}"></td>
                </tr>
                <tr class="total-row">
                    <td colspan="3">Total</td>
                    <td th:text="'$' + ${#numbers.formatDecimal(order.amount, 1, 2)} + ' ' + ${order.currency}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Payment -->
    <div class="card">
        <h2>Payment</h2>

        <div th:if="${order.status == 'CREATED' or order.status == 'SUBMITTED'}" class="payment-processing">
            <div class="spinner"></div>
            <div>
                <div><strong>Payment processing</strong></div>
                <div class="payment-detail">This page will refresh automatically.</div>
            </div>
        </div>

        <div th:if="${order.status == 'PAID'}" class="payment-paid">
            <div class="payment-icon">✓</div>
            <div><strong>Payment complete</strong></div>
        </div>

        <div th:if="${order.status == 'REJECTED'}" class="payment-rejected">
            <div class="payment-icon">✕</div>
            <div><strong>Payment rejected</strong></div>
        </div>

        <div th:if="${paymentMethod != null}" style="margin-top:1rem;">
            <div class="field"><span>Method:</span> <strong th:text="${paymentMethod.label}"></strong></div>
            <div class="field"><span>Type:</span> <strong th:text="${paymentMethod.type}"></strong></div>
        </div>
        <div th:if="${paymentMethod == null}" class="unavailable" style="margin-top:0.75rem;">Payment method details unavailable.</div>
    </div>

    <!-- Shipping -->
    <div class="card">
        <h2>Shipping</h2>
        <div th:if="${shippingAddress != null}">
            <div class="field"><span>Label:</span> <strong th:text="${shippingAddress.label}"></strong></div>
            <div class="field"><span>Address:</span>
                <strong th:text="${shippingAddress.street + ', ' + shippingAddress.city + ', ' + shippingAddress.state + ' ' + shippingAddress.postalCode + ', ' + shippingAddress.country}"></strong>
            </div>
        </div>
        <div th:if="${shippingAddress == null}" class="unavailable">Shipping address details unavailable.</div>
    </div>

</main>
</body>
</html>
