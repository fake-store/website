<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fakestore</title>
    <link rel="stylesheet" th:href="@{/css/fakestore.css}">
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <style>
        main { max-width: 1100px; }
        .search-bar { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
        .search-bar input { flex: 1; padding: 0.6rem 1rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem; }
        .search-bar button { background: var(--brand-purple); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; font-size: 1rem; cursor: pointer; }
        .search-bar button:hover { background: var(--brand-purple-hover); }
        .section-title { font-size: 1rem; color: #6b7280; margin-bottom: 1rem; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.25rem; }
        .product-tile { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-direction: column; }
        .product-tile img { width: 100%; height: 180px; object-fit: cover; background: #e5e7eb; }
        .product-tile .no-image { width: 100%; height: 180px; background: #e5e7eb; display: flex; align-items: center; justify-content: center; color: #9ca3af; font-size: 0.8rem; }
        .product-tile .info { padding: 1rem; flex: 1; display: flex; flex-direction: column; gap: 0.25rem; }
        .product-tile .title { font-weight: 600; font-size: 0.95rem; color: #111827; }
        .product-tile .desc { font-size: 0.8rem; color: #6b7280; flex: 1; }
        .product-tile .price { font-size: 1rem; font-weight: 700; color: var(--brand-purple); margin-top: 0.5rem; }
        .product-tile .actions { padding: 0 1rem 1rem; }
        .add-to-cart { width: 100%; background: var(--brand-purple); color: white; border: none; padding: 0.5rem; border-radius: 6px; font-size: 0.875rem; font-weight: 600; cursor: pointer; }
        .add-to-cart:hover { background: var(--brand-purple-hover); }
        .unavailable { color: #9ca3af; font-style: italic; padding: 2rem 0; }
        .empty { color: #6b7280; padding: 2rem 0; }
    </style>
</head>
<body>
<nav th:replace="~{fragments/nav :: main}"></nav>
<main>
    <form method="get" th:action="@{/}" class="search-bar">
        <input type="text" name="q" th:value="${q}" placeholder="Search products…">
        <button type="submit">Search</button>
    </form>

    <div th:if="${products == null}" class="unavailable">Catalog service unavailable.</div>
    <div th:if="${products != null}">
        <div class="section-title" th:text="${q != null and !q.isEmpty()} ? 'Results for &quot;' + ${q} + '&quot;' : 'Recommended for you'"></div>
        <div th:if="${#lists.isEmpty(products)}" class="empty">No products found.</div>
        <div th:if="${!#lists.isEmpty(products)}" class="product-grid">
            <div th:each="p : ${products}" class="product-tile">
                <img th:if="${p.imagePath != null}" th:src="'/images/' + ${p.imagePath}" th:alt="${p.title}">
                <div th:if="${p.imagePath == null}" class="no-image">No image</div>
                <div class="info">
                    <div class="title" th:text="${p.title}"></div>
                    <div class="desc" th:text="${p.description}"></div>
                    <div class="price" th:text="'$' + ${p.price}"></div>
                </div>
                <div class="actions">
                    <button class="add-to-cart"
                            th:data-product-id="${p.id}"
                            th:data-title="${p.title}"
                            th:data-price="${p.price}"
                            onclick="addToCart(this)">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
</main>
<script>
function addToCart(btn) {
    const body = new URLSearchParams({
        productId: btn.dataset.productId,
        title: btn.dataset.title,
        price: btn.dataset.price,
        quantity: 1
    });
    btn.disabled = true;
    fetch('/cart/add', { method: 'POST', body })
        .then(r => r.json())
        .then(data => {
            const cartBtn = document.querySelector('.cart-btn');
            if (cartBtn) cartBtn.textContent = data.cartCount > 0 ? 'Cart (' + data.cartCount + ')' : 'Cart';
            btn.textContent = 'Added!';
            setTimeout(() => { btn.textContent = 'Add to Cart'; btn.disabled = false; }, 1500);
        })
        .catch(() => { btn.disabled = false; });
}
</script>
</body>
</html>
