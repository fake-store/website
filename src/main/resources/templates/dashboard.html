<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fakestore - Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/fakestore.css}">
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
</head>
<body>
<nav th:replace="~{fragments/nav :: main}"></nav>
<main>
    <div class="card">
        <h2 th:text="'Welcome, ' + ${user.username} + '!'"></h2>
        <p th:text="'Logged in as ' + ${user.email}"></p>
    </div>
</main>
</body>
</html>
