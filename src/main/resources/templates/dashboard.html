<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fakestore - Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f5f5f5; }
        nav { background: #2563eb; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav h1 { margin: 0; font-size: 1.25rem; }
        nav a { color: white; text-decoration: none; font-size: 0.875rem; }
        nav a:hover { text-decoration: underline; }
        main { padding: 2rem; max-width: 800px; margin: 0 auto; }
        .welcome { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<nav>
    <h1>Fakestore</h1>
    <div>
        <span th:text="${user.username}" style="margin-right: 1rem;"></span>
        <a href="/logout">Sign out</a>
    </div>
</nav>
<main>
    <div class="welcome">
        <h2 th:text="'Welcome, ' + ${user.username} + '!'"></h2>
        <p th:text="'Logged in as ' + ${user.email}"></p>
    </div>
</main>
</body>
</html>
