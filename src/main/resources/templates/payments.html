<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fakestore - Payment History</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f5f5f5; }
        nav { background: #2563eb; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav h1 { margin: 0; font-size: 1.25rem; }
        nav a { color: white; text-decoration: none; font-size: 0.875rem; }
        nav a:hover { text-decoration: underline; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        .cart-btn { background: white; color: #2563eb; padding: 0.35rem 0.85rem; border-radius: 6px; font-size: 0.875rem; font-weight: 600; text-decoration: none; }
        .cart-btn:hover { background: #dbeafe; }
        .user-menu { position: relative; }
        .user-menu summary { list-style: none; cursor: pointer; font-size: 0.875rem; color: white; }
        .user-menu summary::-webkit-details-marker { display: none; }
        .user-menu summary::after { content: " ▾"; }
        .user-menu-dropdown { position: absolute; right: 0; top: 100%; margin-top: 0.4rem; background: white; border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); min-width: 150px; z-index: 100; overflow: hidden; }
        .user-menu-dropdown a { display: block; padding: 0.6rem 1rem; color: #111827; font-size: 0.875rem; text-decoration: none; }
        .user-menu-dropdown a:hover { background: #f3f4f6; }
        .user-menu-dropdown hr { margin: 0; border: none; border-top: 1px solid #e5e7eb; }
        main { padding: 2rem; max-width: 900px; margin: 0 auto; display: grid; gap: 1.5rem; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h2 { margin-top: 0; font-size: 1.1rem; color: #1e40af; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.5rem; margin-bottom: 1rem; }
        .unavailable { color: #9ca3af; font-style: italic; }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        th { text-align: left; padding: 0.4rem 0.75rem; background: #f3f4f6; color: #374151; font-weight: 600; }
        td { padding: 0.4rem 0.75rem; border-top: 1px solid #e5e7eb; vertical-align: middle; }
        .back-link { font-size: 0.875rem; color: #6b7280; }
    </style>
</head>
<body>
<nav>
    <h1><a href="/" style="color:white;text-decoration:none;">Fakestore</a></h1>
    <div class="nav-right">
        <a href="/cart" class="cart-btn" th:text="${cartCount > 0 ? 'Cart (' + cartCount + ')' : 'Cart'}">Cart</a>
        <details class="user-menu">
            <summary th:text="${username}"></summary>
            <div class="user-menu-dropdown">
                <a href="/me">My Account</a>
                <a href="/me/orders">My Orders</a>
                <hr>
                <a href="/logout">Sign out</a>
            </div>
        </details>
    </div>
</nav>
<main>
    <a href="/me" class="back-link">← My Account</a>

    <div class="card">
        <h2>Payment History</h2>
        <div th:if="${payments == null}" class="unavailable">Payments service unavailable.</div>
        <div th:if="${payments != null}">
            <div th:if="${#lists.isEmpty(payments)}" class="unavailable">No payment history.</div>
            <table th:if="${!#lists.isEmpty(payments)}">
                <thead>
                    <tr><th>Date</th><th>Order</th><th>Amount</th><th>Currency</th></tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${payments}">
                        <td th:text="${#temporals.format(p.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td><a th:href="@{/me/orders/{id}(id=${p.orderId})}" th:text="${#strings.substring(p.orderId.toString(), 0, 8) + '…'}" style="font-family:monospace;color:#2563eb;"></a></td>
                        <td th:text="${p.amount}"></td>
                        <td th:text="${p.currency}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>
</body>
</html>
