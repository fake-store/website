<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fakestore - Payment History</title>
    <link rel="stylesheet" th:href="@{/css/fakestore.css}">
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <style>
        main { display: grid; gap: 1.5rem; max-width: 900px; }
        .unavailable { color: #9ca3af; font-style: italic; }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        th { text-align: left; padding: 0.4rem 0.75rem; background: #f3f4f6; color: #374151; font-weight: 600; }
        td { padding: 0.4rem 0.75rem; border-top: 1px solid var(--border); vertical-align: middle; }
        td a { color: var(--brand-purple); font-family: monospace; }
        .back-link { font-size: 0.875rem; color: var(--text-muted); text-decoration: none; }
        .back-link:hover { color: var(--text-dark); }
    </style>
</head>
<body>
<nav th:replace="~{fragments/nav :: main}"></nav>
<main>
    <a href="/me" class="back-link">← My Account</a>

    <div class="card">
        <h2>Payment History</h2>
        <div th:if="${payments == null}" class="unavailable">Payments service unavailable.</div>
        <div th:if="${payments != null}">
            <div th:if="${#lists.isEmpty(payments)}" class="unavailable">No payment history.</div>
            <table th:if="${!#lists.isEmpty(payments)}">
                <thead>
                    <tr><th>Date</th><th>Order</th><th>Amount</th><th>Currency</th></tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${payments}">
                        <td th:text="${#temporals.format(p.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td><a th:href="@{/me/orders/{id}(id=${p.orderId})}" th:text="${#strings.substring(p.orderId.toString(), 0, 8) + '…'}"></a></td>
                        <td th:text="${p.amount}"></td>
                        <td th:text="${p.currency}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>
</body>
</html>
