<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fakestore Admin - Add Product</title>
    <link rel="stylesheet" th:href="@{/css/fakestore.css}">
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <style>
        textarea { height: 100px; }
        .note { font-size: 0.78rem; color: #9ca3af; margin-top: 0.25rem; }
    </style>
</head>
<body>
<nav th:replace="~{fragments/nav :: admin}"></nav>
<main style="max-width: 600px;">
    <div class="card">
        <h2>Add Product</h2>
        <div th:if="${success}" class="alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>
        <form method="post" th:action="@{/admin/products/add}">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" required>

            <label for="description">Description</label>
            <textarea id="description" name="description"></textarea>

            <label for="price">Price</label>
            <input type="number" id="price" name="price" step="0.01" min="0" required>

            <label>Image</label>
            <p class="note">Image upload not yet available. Images will be served from <code>/images/</code> via static file server.</p>

            <button type="submit" class="btn" style="margin-top: 1.25rem;">Add Product</button>
        </form>
    </div>
</main>
</body>
</html>
